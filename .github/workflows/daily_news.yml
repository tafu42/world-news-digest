name: Collect News (3x/day)

on:
  # 実行時刻は外部cron（cron-job.org）から workflow_dispatch で正確にトリガーする。
  # GitHub内蔵scheduleは遅延・二重実行を避けるため使わない。
  workflow_dispatch:

permissions:
  contents: write

# 多重起動を防ぐ：収集が並列に走ると、各プロセスが自分の中では5秒間隔を守っていても、
# 合算でGeminiのRPM15を突破して429を招く（手動実行と定時実行が重なる等）。
# 同時に走るのは常に1つだけにし、重なった分は前の実行が終わるまで待たせる。
concurrency:
  group: collect-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Collect & translate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "更新なし"
          else
            git commit -m "chore: update news data [skip ci]"
            git push
          fi
